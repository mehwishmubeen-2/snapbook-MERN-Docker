          case 'reviews':
            return <ReviewsTab reviews={reviews} />;
          case 'availability':
            return <AvailabilityTab availability={availability} selectedDate={selectedDate} onSelectDate={handleCalDate} isOwnProfile={isOwnProfile} onRefreshAvailability={refreshAvailability} />;
          default:
            return <PortfolioTab portfolio={portfolio} onOpenLightbox={setLightboxIdx} />;
        }
      };

      return (
        <>
          {/* Own-profile banner */}
          {isOwnProfile && (
            <div style={{
              background:'#3E2723', color:'#FDFBF7', padding:'10px 28px',
              display:'flex', alignItems:'center', justifyContent:'space-between',
              fontFamily:'Inter,sans-serif', fontSize:13, gap:12,
            }}>
              <span>👋 You are viewing your own public profile</span>
              <a href="/photographer-dashboard.html" style={{
                color:'#f4c165', fontWeight:700, textDecoration:'none',
                border:'1px solid rgba(244,193,101,0.5)', borderRadius:6,
                padding:'4px 12px', whiteSpace:'nowrap',
              }}>Go to Dashboard →</a>
            </div>
          )}

          {/* Hero */}
          <HeroSection photographer={photographer} portfolio={portfolio} />

          {/* Tabs */}
          <TabNav activeTab={activeTab} setActiveTab={setActiveTab} />

          {/* Body */}
          <div className="pp-body">
            <div className="pp-section-card">
              {renderContent()}
              {/* Dashboard shortcut for own profile */}
              {isOwnProfile && (
                <div style={{
                  marginTop:28, padding:'16px 20px',
                  background:'rgba(62,39,35,0.05)', border:'2px dashed rgba(62,39,35,0.2)',
                  borderRadius:12, textAlign:'center',
                }}>
                  <div style={{ fontFamily:'Caveat,cursive', fontSize:18, color:'#795548', marginBottom:10 }}>
                    This is how clients see your profile
                  </div>
                  <div style={{ display:'flex', gap:10, justifyContent:'center', flexWrap:'wrap' }}>
                    <a href="/photographer-dashboard.html#portfolio" style={{
                      display:'inline-flex', alignItems:'center', gap:6,
                      padding:'8px 18px', background:'#3E2723', color:'#FDFBF7',
                      border:'2px solid #3E2723', borderRadius:'255px 15px 225px 15px / 15px 225px 15px 255px',
                      boxShadow:'3px 3px 0 #D84315', fontFamily:'Inter,sans-serif',
                      fontSize:13, fontWeight:700, textDecoration:'none',
                    }}>📷 Add Portfolio Photos</a>
                    <a href="/photographer-dashboard.html" style={{
                      display:'inline-flex', alignItems:'center', gap:6,
                      padding:'8px 18px', background:'#FDFBF7', color:'#3E2723',
                      border:'2px solid #3E2723', borderRadius:'255px 15px 225px 15px / 15px 225px 15px 255px',
                      boxShadow:'3px 3px 0 #3E2723', fontFamily:'Inter,sans-serif',
                      fontSize:13, fontWeight:700, textDecoration:'none',
                    }}>⚙️ Edit Profile & Packages</a>
                  </div>
                </div>
              )}
            </div>
            <BookingSidebar
              photographer={photographer}
              packages={packages}
              selectedPackage={selectedPkg}
              onSelectPackage={handleSelectPkg}
              selectedDate={selectedDate}
              onSelectDate={setSelectedDate}
            />
          </div>

          {/* Lightbox */}
          {lightboxIdx !== null && portfolio.length > 0 && (
            <Lightbox items={portfolio} startIndex={lightboxIdx} onClose={() => setLightboxIdx(null)} />
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  <script src="/chatbot.js"></script>
</body>
</html>
