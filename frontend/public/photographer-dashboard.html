<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photographer Dashboard — SnapBook</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Caveat:wght@400;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/theme.css" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    /* ============================================================
       SNAPBOOK — PHOTOGRAPHER DASHBOARD  ·  Creative Sketchbook
       ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }

    body {
      font-family: var(--font-body);
      background: var(--color-bg);
      background-image: repeating-linear-gradient(
        transparent 0px, transparent 27px,
        rgba(62,39,35,0.04) 27px, rgba(62,39,35,0.04) 28px
      );
      color: var(--color-border-dark);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ── */
    .pd-layout { display: flex; min-height: 100vh; }

    /* ── Sidebar ── */
    .pd-sidebar {
      width: 240px;
      min-height: calc(100vh - 60px);
      background: var(--color-border-dark);
      display: flex;
      flex-direction: column;
      position: fixed;
      left: 0; top: 60px; bottom: 0;
      z-index: 20;
      overflow-y: auto;
    }
    .pd-sidebar-logo {
      padding: 22px 20px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.09);
      display: flex; align-items: center; gap: 10px;
    }
    .pd-logo-icon {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, #D84315, #c07c1a);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .pd-logo-text { font-size: 18px; font-weight: 800; color: #FDFBF7; }

    .pd-sidebar-avatar {
      padding: 20px 20px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.09);
      display: flex; flex-direction: column; align-items: center; gap: 7px;
    }
    .pd-avatar-circle {
      width: 58px; height: 58px;
      border-radius: 50%;
      background: #D84315;
      border: 3px solid rgba(255,255,255,0.18);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Caveat', cursive;
      font-size: 24px; font-weight: 700; color: #FDFBF7;
      overflow: hidden;
    }
    .pd-avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
    .pd-avatar-name { font-family: 'Caveat', cursive; font-size: 17px; font-weight: 700; color: #FDFBF7; text-align: center; }
    .pd-avatar-role { font-size: 11px; color: rgba(255,255,255,0.45); text-align: center; letter-spacing: 0.05em; text-transform: uppercase; }

    .pd-nav { flex: 1; padding: 10px 0; }
    .pd-nav-item {
      display: flex; align-items: center; gap: 11px;
      padding: 11px 20px;
      font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.6);
      cursor: pointer; border: none; background: none;
      width: 100%; text-align: left;
      transition: all 0.14s;
      border-left: 3px solid transparent;
    }
    .pd-nav-item:hover { background: rgba(255,255,255,0.07); color: #FDFBF7; }
    .pd-nav-item.active { background: rgba(216,67,21,0.18); color: #FDFBF7; border-left-color: #D84315; font-weight: 600; }
    .pd-nav-icon { font-size: 17px; width: 20px; flex-shrink: 0; }

    .pd-sidebar-footer { padding: 14px 18px; border-top: 1px solid rgba(255,255,255,0.09); }
    .pd-logout-btn {
      display: flex; align-items: center; gap: 9px;
      width: 100%; padding: 9px 14px;
      background: rgba(184,64,64,0.18); border: 1px solid rgba(184,64,64,0.32);
      border-radius: 7px; color: #ffaaaa; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: background 0.14s;
    }
    .pd-logout-btn:hover { background: rgba(184,64,64,0.32); }

    /* ── Main content ── */
    .pd-main { margin-left: 240px; flex: 1; min-height: 100vh; padding: 32px 40px 48px; }

    .pd-page-title {
      font-family: var(--font-heading);
      font-size: 30px; color: var(--color-border-dark);
      margin-bottom: 24px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }

    /* ── Stat Cards ── */
    .pd-stats-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 18px; margin-bottom: 28px;
    }
    .pd-stat-card {
      background: #FDFBF7;
      border: 2px solid #3E2723;
      border-radius: 18px 22px 16px 20px;
      padding: 20px 18px 16px;
      box-shadow: 4px 4px 0 #3E2723;
      position: relative;
    }
    .pd-stat-label { font-size: 12px; font-weight: 600; color: #795548; margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.05em; }
    .pd-stat-value { font-family: 'Caveat', cursive; font-size: 34px; font-weight: 700; line-height: 1; color: #3E2723; }
    .pd-stat-sub { font-size: 12px; color: #a08070; margin-top: 5px; }
    .pd-stat-icon {
      position: absolute; top: 14px; right: 14px;
      width: 38px; height: 38px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center; font-size: 19px;
    }
    .pd-stat-card.blue .pd-stat-icon { background: rgba(58,110,168,0.12); }
    .pd-stat-card.amber .pd-stat-icon { background: rgba(192,124,26,0.15); }
    .pd-stat-card.green .pd-stat-icon { background: rgba(74,124,89,0.12); }
    .pd-stat-card.terra .pd-stat-icon { background: rgba(216,67,21,0.12); }
    @keyframes pulse-amber {
      0%,100% { box-shadow: 4px 4px 0 #3E2723; }
      50% { box-shadow: 4px 4px 0 #3E2723, 0 0 0 6px rgba(192,124,26,0.18); }
    }
    .pd-stat-card.pulsing { animation: pulse-amber 2s infinite; }

    /* ── Sketch Table wrapper ── */
    .pd-table-wrap {
      background: #FDFBF7;
      border: 2px solid #3E2723;
      border-radius: 18px 22px 16px 20px;
      box-shadow: 4px 4px 0 #3E2723;
      overflow: hidden; margin-bottom: 28px;
    }
    .pd-table-head-row {
      padding: 14px 20px;
      border-bottom: 2px solid #3E2723;
      display: flex; align-items: center; justify-content: space-between;
    }
    .pd-table-title { font-family: 'DM Serif Display', serif; font-size: 19px; color: #3E2723; }
    table.pd-table { width: 100%; border-collapse: collapse; }
    .pd-table th {
      background: #f3e8d8; padding: 9px 16px;
      text-align: left; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.07em; color: #795548;
      border-bottom: 1.5px solid rgba(62,39,35,0.15);
    }
    .pd-table td { padding: 12px 16px; font-size: 14px; color: #3E2723; border-bottom: 1px solid rgba(62,39,35,0.07); }
    .pd-table tr:last-child td { border-bottom: none; }
    .pd-table tbody tr:hover td { background: rgba(243,232,216,0.35); }

    /* ── Badges ── */
    .pd-badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
    .pd-badge-pending   { background: rgba(192,124,26,0.14); color: #8a5a00; }
    .pd-badge-confirmed { background: rgba(58,110,168,0.12); color: #1e4a80; }
    .pd-badge-completed { background: rgba(74,124,89,0.12);  color: #2a5c3c; }
    .pd-badge-cancelled { background: rgba(184,64,64,0.12);  color: #7a1c1c; }

    /* ── Section Card ── */
    .pd-section-card {
      background: #FDFBF7;
      border: 2px solid #3E2723;
      border-radius: 18px 22px 16px 20px;
      box-shadow: 4px 4px 0 #3E2723;
      padding: 22px 24px; margin-bottom: 22px;
    }
    .pd-section-card-title { font-family: 'DM Serif Display', serif; font-size: 18px; color: #3E2723; margin-bottom: 18px; }

    /* ── Buttons ── */
    .pd-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 20px;
      font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer; border: 2px solid #3E2723;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .pd-btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .pd-btn-primary {
      background: #3E2723; color: #FDFBF7;
      border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
      box-shadow: 3px 3px 0 #D84315;
    }
    .pd-btn-primary:not(:disabled):hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 #D84315; }
    .pd-btn-outline {
      background: #FDFBF7; color: #3E2723;
      border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
      box-shadow: 3px 3px 0 #3E2723;
    }
    .pd-btn-outline:not(:disabled):hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 #3E2723; }
    .pd-btn-success { background: #4a7c59; color: #FDFBF7; border-color: #2e5c3c; border-radius: 8px; box-shadow: 3px 3px 0 #2e5c3c; padding: 7px 14px; font-size: 13px; }
    .pd-btn-success:not(:disabled):hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 #2e5c3c; }
    .pd-btn-danger  { background: #b84040; color: #FDFBF7; border-color: #8b2020; border-radius: 8px; box-shadow: 3px 3px 0 #8b2020; padding: 7px 14px; font-size: 13px; }
    .pd-btn-danger:not(:disabled):hover  { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 #8b2020;  }

    /* ── Form Elements ── */
    .pd-label { display: block; font-size: 12px; font-weight: 600; color: #5D4037; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em; }
    .pd-input {
      width: 100%; background: #f3e8d8;
      border: 2px solid rgba(62,39,35,0.25); border-radius: 8px;
      padding: 9px 13px; font-family: 'Inter', sans-serif; font-size: 14px; color: #3E2723;
      outline: none; transition: border-color 0.15s, box-shadow 0.15s;
    }
    .pd-input:focus { border-color: #D84315; box-shadow: 3px 3px 0 rgba(216,67,21,0.2); }
    .pd-input::placeholder { color: #b09a8a; }
    .pd-form-group { margin-bottom: 14px; }

    /* ── Portfolio Polaroid Grid ── */
    .pd-portfolio-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(195px, 1fr));
      gap: 28px; padding: 10px; overflow: visible;
    }
    .pd-polaroid {
      background: #FDFBF7; border: 2px solid #3E2723; border-radius: 3px;
      box-shadow: 5px 5px 0 #3E2723; overflow: visible;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer; position: relative;
    }
    .pd-polaroid:hover { transform: translateY(-5px) rotate(0deg) !important; box-shadow: 8px 8px 0 #3E2723; }
    .pd-polaroid-img { width: 100%; height: 175px; object-fit: cover; display: block; border-bottom: 2px solid #3E2723; background: #f3e8d8; }
    .pd-polaroid-caption { padding: 9px 12px 13px; font-family: 'Caveat', cursive; font-size: 16px; font-weight: 600; color: #3E2723; }
    .pd-polaroid-delete {
      position: absolute; top: -9px; right: -9px;
      width: 26px; height: 26px; background: #D84315;
      border: 2px solid #3E2723; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; color: #FDFBF7; cursor: pointer; font-weight: 700; z-index: 2;
    }
    .pd-polaroid-delete:hover { background: #b84040; }
    .pd-polaroid-placeholder {
      width: 100%; height: 175px; background: #ede0d4;
      display: flex; align-items: center; justify-content: center;
      border-bottom: 2px solid #3E2723; font-size: 40px;
    }

    /* ── Lightbox ── */
    .pd-lightbox-overlay {
      position: fixed; inset: 0; background: rgba(44,24,16,0.9);
      z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .pd-lightbox-inner { max-width: 860px; position: relative; }
    .pd-lightbox-img { max-width: 100%; max-height: 82vh; border: 3px solid #FDFBF7; border-radius: 3px; display: block; }
    .pd-lightbox-close {
      position: absolute; top: -14px; right: -14px;
      width: 34px; height: 34px; background: #D84315;
      border: 2px solid #3E2723; border-radius: 50%;
      color: #FDFBF7; font-size: 17px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
    }
    .pd-lightbox-caption { font-family: 'Caveat', cursive; font-size: 20px; color: #FDFBF7; text-align: center; margin-top: 11px; }

    /* ── Modal ── */
    .pd-modal-overlay {
      position: fixed; inset: 0; background: rgba(44,24,16,0.58);
      z-index: 500; display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .pd-modal {
      background: #FDFBF7; border: 2px solid #3E2723;
      border-radius: 18px 22px 16px 20px; box-shadow: 8px 8px 0 #3E2723;
      padding: 26px 28px; width: 100%; max-width: 480px; position: relative;
    }
    .pd-modal-title { font-family: 'DM Serif Display', serif; font-size: 22px; color: #3E2723; margin-bottom: 20px; }
    .pd-modal-close { position: absolute; top: 15px; right: 16px; background: none; border: none; font-size: 20px; color: #795548; cursor: pointer; }
    .pd-modal-close:hover { color: #3E2723; }

    /* ── Availability ── */
    .pd-day-pills { display: flex; flex-wrap: wrap; gap: 9px; }
    .pd-day-pill {
      padding: 8px 16px; border: 2px solid #3E2723;
      border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
      font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
      cursor: pointer; background: #FDFBF7; color: #3E2723;
      box-shadow: 3px 3px 0 #3E2723; transition: all 0.1s;
    }
    .pd-day-pill.active { background: #3E2723; color: #FDFBF7; box-shadow: 3px 3px 0 #D84315; }
    .pd-day-pill:hover { transform: translate(-1px,-1px); }
    .pd-time-row { display: flex; gap: 16px; }
    .pd-time-row .pd-form-group { flex: 1; margin-bottom: 0; }
    .pd-blocked-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
    .pd-blocked-chip {
      display: flex; align-items: center; gap: 6px;
      background: #f3e8d8; border: 1.5px solid #3E2723;
      border-radius: 255px 5px 255px 5px / 5px 255px 5px 255px;
      padding: 4px 10px 4px 13px;
      font-family: 'Caveat', cursive; font-size: 15px; font-weight: 600; color: #3E2723;
    }
    .pd-blocked-chip button { background: none; border: none; color: #D84315; cursor: pointer; font-size: 14px; padding: 0; line-height: 1; }
    .pd-blocked-chip button:hover { color: #b84040; }
    .pd-date-add-row { display: flex; gap: 10px; align-items: flex-end; }
    .pd-date-add-row .pd-form-group { flex: 1; margin-bottom: 0; }

    /* ── Packages ── */
    .pd-packages-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; }
    .pd-package-card {
      background: #FDFBF7; border: 2px solid #3E2723;
      border-radius: 18px 22px 16px 20px; box-shadow: 4px 4px 0 #3E2723;
      padding: 20px; position: relative;
    }
    .pd-package-tier { font-family: 'Caveat', cursive; font-size: 23px; font-weight: 700; margin-bottom: 14px; }
    .pd-tier-basic    { color: #3a6ea8; }
    .pd-tier-standard { color: #c07c1a; }
    .pd-tier-premium  { color: #D84315; }
    .pd-pkg-active-row { position: absolute; top: 16px; right: 16px; display: flex; align-items: center; gap: 6px; }
    .pd-pkg-active-row span { font-size: 12px; color: #795548; }
    .pd-toggle { position: relative; width: 38px; height: 21px; cursor: pointer; display: inline-block; }
    .pd-toggle input { opacity: 0; width: 0; height: 0; }
    .pd-toggle-slider {
      position: absolute; inset: 0;
      background: #c9b499; border-radius: 999px; border: 2px solid #3E2723;
      transition: background 0.2s;
    }
    .pd-toggle-slider::before {
      content: ''; position: absolute; width: 13px; height: 13px;
      left: 2px; top: 2px; background: #FDFBF7; border-radius: 50%; transition: transform 0.2s;
    }
    .pd-toggle input:checked ~ .pd-toggle-slider { background: #4a7c59; }
    .pd-toggle input:checked ~ .pd-toggle-slider::before { transform: translateX(17px); }
    .pd-pkg-price-row { display: flex; align-items: baseline; gap: 6px; margin-bottom: 14px; }
    .pd-pkg-currency { font-family: 'Caveat', cursive; font-size: 17px; font-weight: 600; color: #795548; }
    .pd-pkg-price-input {
      font-family: 'Caveat', cursive; font-size: 30px; font-weight: 700; color: #3E2723;
      border: none; border-bottom: 2.5px dashed #c9b499; background: transparent;
      width: 130px; outline: none;
    }
    .pd-pkg-price-input:focus { border-bottom-color: #D84315; }
    .pd-pkg-features {
      width: 100%; background: #f3e8d8; border: 1.5px solid rgba(62,39,35,0.2);
      border-radius: 8px; padding: 8px 10px; font-family: 'Inter', sans-serif;
      font-size: 13px; color: #3E2723; resize: vertical; min-height: 80px; outline: none;
    }
    .pd-pkg-features:focus { border-color: #D84315; }
    .pd-pkg-save-btn { margin-top: 14px; width: 100%; justify-content: center; }

    /* ── Expanded Order Row ── */
    .pd-order-expand-td { background: #f9f0e6; padding: 16px 20px !important; }
    .pd-order-detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px 20px; margin-bottom: 16px; }
    .pd-detail-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: #8a6552; margin-bottom: 3px; }
    .pd-detail-value { font-size: 14px; font-weight: 500; color: #3E2723; }
    .pd-order-actions { display: flex; gap: 10px; }
    .pd-expand-toggle { cursor: pointer; font-size: 14px; color: #D84315; font-weight: 700; user-select: none; }

    /* ── Earnings Hero ── */
    .pd-earnings-hero {
      background: #3E2723; border-radius: 18px 22px 16px 20px;
      padding: 28px 32px; margin-bottom: 24px;
      display: grid; grid-template-columns: repeat(3,1fr); gap: 20px;
      position: relative; overflow: hidden;
    }
    .pd-earnings-hero::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, #D84315 0%, #c07c1a 50%, #D84315 100%);
    }
    .pd-earnings-col {
      display: flex; flex-direction: column; align-items: center; gap: 7px;
      padding: 16px 12px; border-radius: 12px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      text-align: center;
    }
    .pd-earn-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.45); }
    .pd-earn-value { font-family: 'Caveat', cursive; font-size: 38px; font-weight: 700; color: #FDFBF7; line-height: 1; }
    .pd-earnings-col.amber .pd-earn-value { color: #f4c165; }
    .pd-earnings-col.green .pd-earn-value { color: #7ecfa3; }
    .pd-earn-sub { font-size: 12px; color: rgba(255,255,255,0.38); }

    /* ── Pending earnings banner ── */
    .pd-pending-banner {
      background: rgba(192,124,26,0.1); border: 2px solid #c07c1a;
      border-radius: 14px 18px 12px 16px; box-shadow: 4px 4px 0 #c07c1a;
      padding: 16px 20px; display: flex; align-items: center; gap: 14px; margin-top: 20px;
    }

    /* ── Empty & Loading ── */
    .pd-empty { text-align: center; padding: 48px 20px; }
    .pd-empty-icon { font-size: 46px; margin-bottom: 10px; }
    .pd-empty-text { font-family: 'Caveat', cursive; font-size: 20px; color: #8a6552; }
    .pd-loading { display: flex; gap: 10px; justify-content: center; padding: 52px 0; }
    .pd-loading-dot { width: 12px; height: 12px; background: #D84315; border-radius: 50%; animation: pd-bounce 1.2s infinite ease-in-out; }
    .pd-loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .pd-loading-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pd-bounce { 0%,80%,100% { transform: scale(0.5); opacity: 0.35; } 40% { transform: scale(1); opacity: 1; } }

    /* ── Toast ── */
    .pd-toast {
      position: fixed; bottom: 26px; right: 26px;
      background: #3E2723; color: #FDFBF7;
      border: 2px solid #D84315; border-radius: 10px 14px 10px 12px;
      padding: 11px 20px; font-family: 'Caveat', cursive; font-size: 18px; font-weight: 600;
      box-shadow: 4px 4px 0 #D84315; z-index: 2000;
      animation: pd-slidein 0.28s ease;
    }
    @keyframes pd-slidein { from { transform: translateY(18px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* ── Responsive ── */
    @media (max-width: 1100px) {
      .pd-stats-grid { grid-template-columns: repeat(2,1fr); }
      .pd-packages-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 768px) {
      .pd-sidebar { transform: translateX(-240px); }
      .pd-main { margin-left: 0; padding: 20px 16px 40px; }
      .pd-stats-grid { grid-template-columns: 1fr 1fr; }
      .pd-packages-grid { grid-template-columns: 1fr; }
      .pd-earnings-hero { grid-template-columns: 1fr; }
    }
  </style>
  <script src="/navbar.js"></script>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useCallback } = React;

    /* ── Auth helpers ── */
    const getToken = () => localStorage.getItem('token');
    const getUser  = () => { try { return JSON.parse(localStorage.getItem('user') || 'null'); } catch { return null; } };
    const authHdr  = () => ({ 'Content-Type': 'application/json', Authorization: `Bearer ${getToken()}` });
    const fmt = n  => 'PKR ' + (Number(n) || 0).toLocaleString('en-PK');

    async function api(url, opts = {}) {
      const res = await fetch(url, { ...opts, headers: { ...authHdr(), ...(opts.headers || {}) } });
      if (res.status === 401) { window.location.href = '/login.html'; return null; }
      return res.json().catch(() => null);
    }

    /* ── Custom hook: Toast ── */
    function useToast() {
      const [toast, setToast] = useState(null);
      const show = useCallback((msg) => {
        setToast(msg);
        setTimeout(() => setToast(null), 3000);
      }, []);
      return [toast, show];
    }

    /* ── Shared primitives ── */
    function Loading() {
      return (
        <div className="pd-loading">
          <div className="pd-loading-dot" /><div className="pd-loading-dot" /><div className="pd-loading-dot" />
        </div>
      );
    }
    function Empty({ icon = null, text = 'Nothing here yet' }) {
      return (
        <div className="pd-empty">
          <div className="pd-empty-icon">{icon}</div>
          <div className="pd-empty-text">{text}</div>
        </div>
      );
    }
    function StatusBadge({ status }) {
      const map = { pending:'pd-badge-pending', confirmed:'pd-badge-confirmed', completed:'pd-badge-completed', cancelled:'pd-badge-cancelled' };
      return <span className={`pd-badge ${map[status] || 'pd-badge-pending'}`}>{status || 'unknown'}</span>;
    }
    function Toast({ msg }) {
      return msg ? <div className="pd-toast">{msg}</div> : null;
    }
    function fmtDate(dt) {
      if (!dt) return '—';
      return new Date(dt).toLocaleDateString('en-PK', { day:'numeric', month:'short', year:'numeric' });
    }

    /* ==============================================================
       TAB: OVERVIEW
       ============================================================== */
    function OverviewTab() {
      const [stats, setStats]   = useState({ total:0, pending:0, monthly:0, rating:0 });
      const [orders, setOrders] = useState([]);
      const [loading, setLoading] = useState(true);
      const user = getUser();
      const userId = user?._id || user?.id;

      useEffect(() => {
        Promise.all([
          api('/api/orders'),
          api('/api/commission/earnings'),
          api(`/api/photographers/profile/me`),
        ]).then(([ordData, earData, proData]) => {
          const all = ordData?.orders || [];
          const now = new Date();
          const pending = all.filter(o => (o.bookingStatus || o.status) === 'pending').length;
          const monthly = all.filter(o => {
            const d = new Date(o.createdAt);
            return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
          }).reduce((s, o) => s + (o.totalAmount || 0), 0);
          setStats({
            total: all.length,
            pending,
            monthly: earData?.photographerEarning || Math.round(monthly * 0.85),
            rating: proData?.photographer?.rating || proData?.rating || 0,
          });
          setOrders(all.slice(0, 8));
          setLoading(false);
        }).catch(() => setLoading(false));
      }, []);

      const cards = [
        { label:'Total Bookings',   value: stats.total,                           icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{width:22,height:22}}><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>, color:'blue',  sub:'All time' },
        { label:'Pending Requests', value: stats.pending,                         icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{width:22,height:22}}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>, color:'amber', sub:'Awaiting confirmation', pulse: stats.pending > 0 },
        { label:'Monthly Earnings', value: fmt(Math.round(stats.monthly)),        icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{width:22,height:22}}><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>, color:'green', sub:'Your 85% share' },
        { label:'Avg Rating',       value: Number(stats.rating).toFixed(1) + ' ★', icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{width:22,height:22}}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>, color:'terra', sub:'From all reviews' },
      ];

      return (
        <div>
          <h1 className="pd-page-title"><span>Overview</span></h1>
          <div className="pd-stats-grid">
            {cards.map(c => (
              <div key={c.label} className={`pd-stat-card ${c.color}${c.pulse ? ' pulsing' : ''}`}>
                <div className="pd-stat-icon">{c.icon}</div>
                <div className="pd-stat-label">{c.label}</div>
                <div className="pd-stat-value">{loading ? '—' : c.value}</div>
                <div className="pd-stat-sub">{c.sub}</div>
              </div>
            ))}
          </div>
          <div className="pd-table-wrap">
            <div className="pd-table-head-row">
              <span className="pd-table-title">Recent Orders</span>
            </div>
            {loading ? <Loading /> : orders.length === 0
              ? <Empty icon={<svg viewBox="0 0 24 24" fill="none" stroke="#D84315" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{width:40,height:40}}><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>} text="No orders yet — share your profile link!" />
              : (
                <table className="pd-table">
                  <thead><tr>
                    <th>Customer</th><th>Event Type</th><th>Date</th>
                    <th>Amount</th><th>Status</th>
                  </tr></thead>
                  <tbody>
                    {orders.map(o => (
                      <tr key={o._id}>
                        <td>{o.customerId?.name || o.customerName || '—'}</td>
                        <td>{o.eventType || '—'}</td>
                        <td>{fmtDate(o.eventDate)}</td>
                        <td style={{fontFamily:'Caveat,cursive',fontSize:16,fontWeight:700}}>{fmt(o.totalAmount)}</td>
                        <td><StatusBadge status={o.bookingStatus || o.status} /></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
          </div>
        </div>
      );
    }

    /* ==============================================================
       TAB: PORTFOLIO
       ============================================================== */
    function PortfolioTab() {
      const [items, setItems]       = useState([]);
      const [loading, setLoading]   = useState(true);
      const [showModal, setShowModal] = useState(false);
      const [lightbox, setLightbox] = useState(null);
      const [form, setForm]         = useState({ imageUrl:'', title:'', description:'' });
      const [saving, setSaving]     = useState(false);
      const [toast, showToast]      = useToast();

      const ROTS = ['-2.2deg','1.6deg','-1deg','2.4deg','-0.8deg','1.3deg','-1.9deg','0.7deg'];

      useEffect(() => {
        api('/api/portfolio').then(d => {
          setItems(d?.portfolio || d?.items || d?.data || []);
          setLoading(false);
        }).catch(() => setLoading(false));
      }, []);

      const handleUpload = async (e) => {
        e.preventDefault();
        if (!form.imageUrl) return;
        setSaving(true);
        const d = await api('/api/portfolio', {
          method: 'POST',
          body: JSON.stringify({ imageUrl: form.imageUrl, title: form.title, description: form.description }),
        });
        setSaving(false);
        if (d) {
          const newItem = d.item || d.portfolio || { _id: Date.now().toString(), ...form };
          setItems(prev => [newItem, ...prev]);
          setForm({ imageUrl:'', title:'', description:'' });
          setShowModal(false);
          showToast('✓ Photo added to portfolio!');
        } else {
          showToast('✗ Upload failed — check console');
        }
      };

      const handleDelete = async (id, e) => {
        e.stopPropagation();
        if (!confirm('Remove this photo from portfolio?')) return;
        await api(`/api/portfolio/${id}`, { method:'DELETE' });
        setItems(prev => prev.filter(it => it._id !== id));
        showToast('✓ Photo removed');
      };

      return (
        <div>
          <h1 className="pd-page-title">
            <span>Portfolio</span>
            <button className="pd-btn pd-btn-primary" onClick={() => setShowModal(true)}>＋ Upload Photo</button>
          </h1>
          {loading ? <Loading /> : items.length === 0
            ? <div className="pd-section-card"><Empty icon={<svg viewBox="0 0 24 24" fill="none" stroke="#D84315" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{width:40,height:40}}><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>} text="Add your first portfolio photo!" /></div>
            : (
              <div className="pd-portfolio-grid">
                {items.map((item, i) => (
                  <div
                    key={item._id}
                    className="pd-polaroid"
                    style={{ transform:`rotate(${ROTS[i % ROTS.length]})` }}
                    onClick={() => setLightbox(item)}
                  >
                    {item.imageUrl
                      ? <img src={item.imageUrl} alt={item.title || ''} className="pd-polaroid-img" onError={e => e.target.style.display='none'} />
                      : <div className="pd-polaroid-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="#c9b499" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{width:32,height:32}}><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg></div>
                    }
                    <div className="pd-polaroid-caption">{item.title || 'Untitled'}</div>
                    <button className="pd-polaroid-delete" onClick={(e) => handleDelete(item._id, e)}>✕</button>
                  </div>
                ))}
              </div>
            )}

          {/* Upload Modal */}
          {showModal && (
            <div className="pd-modal-overlay" onClick={() => setShowModal(false)}>
              <div className="pd-modal" onClick={e => e.stopPropagation()}>
                <button className="pd-modal-close" onClick={() => setShowModal(false)}>✕</button>
                <h2 className="pd-modal-title">Upload Portfolio Photo</h2>
                <form onSubmit={handleUpload}>
                  <div className="pd-form-group">
                    <label className="pd-label">Image URL *</label>
                    <input className="pd-input" type="url" placeholder="https://..." required
                      value={form.imageUrl} onChange={e => setForm(f => ({...f, imageUrl:e.target.value}))} />
                  </div>
                  <div className="pd-form-group">
                    <label className="pd-label">Title</label>
                    <input className="pd-input" type="text" placeholder="e.g. Summer Wedding, Lahore"
                      value={form.title} onChange={e => setForm(f => ({...f, title:e.target.value}))} />
                  </div>
                  <div className="pd-form-group">
                    <label className="pd-label">Description</label>
                    <textarea className="pd-input" placeholder="Brief description…" rows={3}
                      style={{resize:'vertical', borderRadius:8}}
                      value={form.description} onChange={e => setForm(f => ({...f, description:e.target.value}))} />
                  </div>
                  <button type="submit" className="pd-btn pd-btn-primary" style={{width:'100%', justifyContent:'center'}} disabled={saving}>
                    {saving ? 'Uploading…' : '＋ Add to Portfolio'}
                  </button>
                </form>
              </div>
            </div>
          )}

          {/* Lightbox */}
          {lightbox && (
            <div className="pd-lightbox-overlay" onClick={() => setLightbox(null)}>
              <div className="pd-lightbox-inner" onClick={e => e.stopPropagation()}>
                <button className="pd-lightbox-close" onClick={() => setLightbox(null)}>✕</button>
                <img src={lightbox.imageUrl} alt={lightbox.title || ''} className="pd-lightbox-img" />
                {lightbox.title && <div className="pd-lightbox-caption">{lightbox.title}</div>}
              </div>
            </div>
          )}
          <Toast msg={toast} />
        </div>
      );
    }

    /* ==============================================================
       TAB: AVAILABILITY
       ============================================================== */
    function AvailabilityTab() {
      const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
      const [workingDays, setWorkingDays] = useState([]);
      const [start, setStart] = useState('09:00');
      const [end,   setEnd  ] = useState('18:00');
      const [blocked, setBlocked] = useState([]);
      const [newDate, setNewDate] = useState('');
      const [loading, setLoading] = useState(true);
      const [saving,  setSaving ] = useState(false);
      const [toast, showToast]    = useToast();
      const user   = getUser();
      const userId = user?._id || user?.id;

      useEffect(() => {
        api(`/api/availability/${userId}`).then(d => {
          const av = d?.availability || d?.data || d;
          if (av && typeof av === 'object' && !av.message) {
            setWorkingDays(av.workingDays || []);
            setStart(av.workingHours?.start || '09:00');
            setEnd(av.workingHours?.end   || '18:00');
            setBlocked((av.blockedDates || []).map(dt => new Date(dt).toISOString().split('T')[0]));
          }
          setLoading(false);
        }).catch(() => setLoading(false));
      }, [userId]);

      const toggleDay = (day) =>
        setWorkingDays(prev => prev.includes(day) ? prev.filter(d => d !== day) : [...prev, day]);

      const addDate = () => {
        if (newDate && !blocked.includes(newDate)) {
          setBlocked(prev => [...prev, newDate].sort());
          setNewDate('');
        }
      };

      const handleSave = async () => {
        setSaving(true);
        const d = await api('/api/availability', {
          method: 'PUT',
          body: JSON.stringify({ workingDays, workingHours:{ start, end }, blockedDates: blocked }),
        });
        setSaving(false);
        showToast(d?.availability || d?.success ? '✓ Availability saved!' : '✗ Save failed');
      };

      if (loading) return <><h1 className="pd-page-title"><span>Availability</span></h1><Loading /></>;

      return (
        <div>
          <h1 className="pd-page-title"><span>Availability</span></h1>

          <div className="pd-section-card">
            <div className="pd-section-card-title">Working Days</div>
            <div className="pd-day-pills">
              {DAYS.map(day => (
                <button key={day} type="button"
                  className={`pd-day-pill${workingDays.includes(day) ? ' active' : ''}`}
                  onClick={() => toggleDay(day)}>
                  {day.slice(0,3)}
                </button>
              ))}
            </div>
          </div>

          <div className="pd-section-card">
            <div className="pd-section-card-title">Working Hours</div>
            <div className="pd-time-row">
              <div className="pd-form-group">
                <label className="pd-label">Start Time</label>
                <input type="time" className="pd-input" value={start} onChange={e => setStart(e.target.value)} />
              </div>
              <div className="pd-form-group">
                <label className="pd-label">End Time</label>
                <input type="time" className="pd-input" value={end} onChange={e => setEnd(e.target.value)} />
              </div>
            </div>
          </div>

          <div className="pd-section-card">
            <div className="pd-section-card-title">Blocked Dates</div>
            <div className="pd-date-add-row">
              <div className="pd-form-group">
                <label className="pd-label">Select Date to Block</label>
                <input type="date" className="pd-input" value={newDate}
                  min={new Date().toISOString().split('T')[0]}
                  onChange={e => setNewDate(e.target.value)} />
              </div>
              <button type="button" className="pd-btn pd-btn-outline"
                onClick={addDate} disabled={!newDate} style={{whiteSpace:'nowrap',marginBottom:14}}>
                Block This Date
              </button>
            </div>
            {blocked.length > 0 && (
              <div className="pd-blocked-list">
                {blocked.map(dt => (
                  <div key={dt} className="pd-blocked-chip">
                    {new Date(dt + 'T12:00:00').toLocaleDateString('en-PK',{day:'numeric',month:'short',year:'numeric'})}
                    <button onClick={() => setBlocked(prev => prev.filter(d => d !== dt))}>✕</button>
                  </div>
                ))}
              </div>
            )}
          </div>

          <button className="pd-btn pd-btn-primary" onClick={handleSave} disabled={saving} style={{minWidth:180}}>
            {saving ? <><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{width:14,height:14,verticalAlign:'middle',marginRight:5}}><polyline points="20 6 9 17 4 12"/></svg>Saving…</> : <><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{width:14,height:14,verticalAlign:'middle',marginRight:5}}><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>Save Availability</>}
          </button>
          <Toast msg={toast} />
        </div>
      );
    }

    /* ==============================================================
       TAB: PACKAGES
       ============================================================== */
    function PackagesTab() {
      const TIERS = [
        { key:'Basic',    label:'Basic',    cls:'pd-tier-basic'    },
        { key:'Standard', label:'Standard', cls:'pd-tier-standard' },
        { key:'Premium',  label:'Premium',  cls:'pd-tier-premium'  },
      ];
      const empty = () => ({ price:'', duration:'', features:'', active:true, _id:null });
      const [pkgs, setPkgs]     = useState({ Basic:empty(), Standard:empty(), Premium:empty() });
      const [loading, setLoading] = useState(true);
      const [saving,  setSaving]  = useState({});
      const [toast, showToast]    = useToast();
      const user   = getUser();
      const userId = user?._id || user?.id;

      useEffect(() => {
        api(`/api/packages/${userId}`).then(d => {
          const list = d?.packages || d?.data || [];
          setPkgs(prev => {
            const updated = { ...prev };
            list.forEach(p => {
              if (updated[p.name] !== undefined) {
                updated[p.name] = {
                  price:    p.price || '',
                  duration: p.duration || '',
                  features: Array.isArray(p.features) ? p.features.join('\n') : (p.features || ''),
                  active:   p.active !== false,
                  _id:      p._id,
                };
              }
            });
            return updated;
          });
          setLoading(false);
        }).catch(() => setLoading(false));
      }, [userId]);

      const update = (tier, field, val) =>
        setPkgs(prev => ({ ...prev, [tier]: { ...prev[tier], [field]: val } }));

      const save = async (tier) => {
        setSaving(s => ({...s, [tier]:true}));
        const p = pkgs[tier];
        const body = {
          name: tier,
          price: Number(p.price) || 0,
          duration: Number(p.duration) || 0,
          features: p.features.split('\n').map(f => f.trim()).filter(Boolean),
          active: p.active,
        };
        let d;
        if (p._id) {
          d = await api(`/api/packages/${p._id}`, { method:'PUT', body:JSON.stringify(body) });
        } else {
          d = await api('/api/packages', { method:'POST', body:JSON.stringify(body) });
          const newId = d?.package?._id || d?.data?._id;
          if (newId) setPkgs(prev => ({ ...prev, [tier]: { ...prev[tier], _id: newId } }));
        }
        setSaving(s => ({...s, [tier]:false}));
        showToast(d?.success || d?.package || d?.data ? `✓ ${tier} package saved!` : `✗ Failed to save ${tier}`);
      };

      if (loading) return <><h1 className="pd-page-title"><span>Packages</span></h1><Loading /></>;

      return (
        <div>
          <h1 className="pd-page-title"><span>Packages</span></h1>
          <div className="pd-packages-grid">
            {TIERS.map(({ key, label, cls }) => {
              const p = pkgs[key];
              return (
                <div key={key} className="pd-package-card">
                  <div className="pd-pkg-active-row">
                    <label className="pd-toggle">
                      <input type="checkbox" checked={p.active} onChange={e => update(key,'active',e.target.checked)} />
                      <span className="pd-toggle-slider" />
                    </label>
                    <span>{p.active ? 'Active' : 'Inactive'}</span>
                  </div>
                  <div className={`pd-package-tier ${cls}`}>{label}</div>

                  <div className="pd-pkg-price-row">
                    <span className="pd-pkg-currency">PKR</span>
                    <input className="pd-pkg-price-input" type="number" placeholder="0"
                      value={p.price} onChange={e => update(key,'price',e.target.value)} />
                  </div>

                  <div className="pd-form-group">
                    <label className="pd-label">Duration (hours)</label>
                    <input className="pd-input" type="number" placeholder="e.g. 4"
                      value={p.duration} onChange={e => update(key,'duration',e.target.value)} />
                  </div>

                  <div className="pd-form-group">
                    <label className="pd-label">Features (one per line)</label>
                    <textarea className="pd-pkg-features"
                      placeholder={"Edited photos\nOnline gallery\nPrint copies"}
                      value={p.features} onChange={e => update(key,'features',e.target.value)} />
                  </div>

                  <button className="pd-btn pd-btn-primary pd-pkg-save-btn"
                    onClick={() => save(key)} disabled={saving[key]}>
                    {saving[key] ? <><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{width:14,height:14,verticalAlign:'middle',marginRight:5}}><polyline points="20 6 9 17 4 12"/></svg>Saving…</> : <><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{width:14,height:14,verticalAlign:'middle',marginRight:5}}><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>Save Package</>}
                  </button>
                </div>
              );
            })}
          </div>
          <Toast msg={toast} />
        </div>
      );
    }

    /* ==============================================================
       TAB: MY ORDERS
       ============================================================== */
    function OrdersTab() {
      const [orders, setOrders]   = useState([]);
      const [loading, setLoading] = useState(true);
      const [expanded, setExpanded] = useState(null);
      const [toast, showToast]    = useToast();

      useEffect(() => {
        api('/api/orders').then(d => {
          setOrders(d?.orders || d?.data || []);
          setLoading(false);
        }).catch(() => setLoading(false));
      }, []);

      const toggle = (id) => setExpanded(prev => prev === id ? null : id);

      const updateStatus = async (orderId, status) => {
        const d = await api(`/api/orders/${orderId}/status`, {
          method: 'PATCH',
          body: JSON.stringify({ status }),
        });
        if (d?.success || d?.order) {
          setOrders(prev => prev.map(o => o._id === orderId ? { ...o, bookingStatus: status, status } : o));
          showToast(`✓ Order ${status}`);
        } else {
          /* fallback: try cancel endpoint */
          if (status === 'cancelled') {
            const d2 = await api(`/api/orders/${orderId}/cancel`, { method:'PATCH', body:JSON.stringify({}) });
            if (d2?.success) {
              setOrders(prev => prev.map(o => o._id === orderId ? { ...o, bookingStatus:'cancelled', status:'cancelled' } : o));
              showToast('✓ Order cancelled');
            }
          }
        }
      };

      return (
        <div>
          <h1 className="pd-page-title"><span>My Orders</span></h1>
          {loading ? <Loading /> : orders.length === 0
            ? <div className="pd-section-card"><Empty icon={<svg viewBox="0 0 24 24" fill="none" stroke="#D84315" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{width:40,height:40}}><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>} text="No orders yet" /></div>

                <table className="pd-table">

                    <th style={{width:36}}></th>
                    <th>Customer</th><th>Event</th><th>Date</th>
                    <th>Amount</th><th>Status</th>
                  </tr></thead>
                  <tbody>
                    {orders.map(o => {
                      const st = o.bookingStatus || o.status || 'pending';
                      const isOpen = expanded === o._id;
                      return (
                        <React.Fragment key={o._id}>
                          <tr>
                            <td>
                              <span className="pd-expand-toggle" onClick={() => toggle(o._id)}>
                                {isOpen ? '▲' : '▼'}
                              </span>
                            </td>
                            <td>{o.customerId?.name || o.customerName || '—'}</td>
                            <td>{o.eventType || '—'}</td>
                            <td>{fmtDate(o.eventDate)}</td>
                            <td style={{fontFamily:'Caveat,cursive',fontSize:16,fontWeight:700}}>{fmt(o.totalAmount)}</td>
                            <td><StatusBadge status={st} /></td>
                          </tr>
                          {isOpen && (
                            <tr>
                              <td colSpan={6} className="pd-order-expand-td">
                                <div className="pd-order-detail-grid">
                                  <div>
                                    <div className="pd-detail-label">Order ID</div>
                                    <div className="pd-detail-value" style={{fontSize:12,fontFamily:'monospace'}}>{o._id}</div>
                                  </div>
                                  <div>
                                    <div className="pd-detail-label">Location</div>
                                    <div className="pd-detail-value">{o.location || o.city || '—'}</div>
                                  </div>
                                  <div>
                                    <div className="pd-detail-label">Package</div>
                                    <div className="pd-detail-value">{o.packageName || o.package || '—'}</div>
                                  </div>
                                  <div>
                                    <div className="pd-detail-label">Payment Status</div>
                                    <div className="pd-detail-value">{o.paymentStatus || '—'}</div>
                                  </div>
                                  <div>
                                    <div className="pd-detail-label">Your Earning</div>
                                    <div className="pd-detail-value" style={{color:'#4a7c59',fontWeight:700}}>
                                      {fmt(Math.round((o.totalAmount || 0) * 0.85))}
                                    </div>
                                  </div>
                                  {o.notes && (
                                    <div style={{gridColumn:'1/-1'}}>
                                      <div className="pd-detail-label">Customer Notes</div>
                                      <div className="pd-detail-value">{o.notes}</div>
                                    </div>
                                  )}
                                </div>
                                {st === 'pending' && (
                                  <div className="pd-order-actions">
                                    <button className="pd-btn pd-btn-success" onClick={() => updateStatus(o._id,'confirmed')}>✓ Accept</button>
                                    <button className="pd-btn pd-btn-danger"  onClick={() => updateStatus(o._id,'cancelled')}>✕ Decline</button>
                                  </div>
                                )}
                              </td>
                            </tr>
                          )}
                        </React.Fragment>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}
          <Toast msg={toast} />
        </div>
      );
    }

      const [toast, showToast]    = useToast();

      useEffect(() => {
        api('/api/photographers/profile/me').then(d => {
          const p = d?.profile || {};

            bio:                p.bio                || '',
            specialization:     p.specialization     || '',
            city:               p.city               || '',
            state:              p.state              || '',
            country:            p.country            || '',
            experience:         p.experience         || '',
            pricePerHour:       p.pricePerHour       || '',

              <div className="pd-form-group">

            </button>
          </div>
          <Toast msg={toast} />
        </div>
      );

          <div className="pd-sidebar-avatar">
            <div className="pd-avatar-circle">
              {user?.profileImage ? <img src={user.profileImage} alt="avatar" /> : initials}
            </div>
            <div className="pd-avatar-name">{user?.name || 'Photographer'}</div>
            <div className="pd-avatar-role">Photographer</div>
          </div>
          <nav className="pd-nav">
            {NAV.map(item => (
              <button key={item.id} className={`pd-nav-item${tab === item.id ? ' active' : ''}`}
                onClick={() => setTab(item.id)}>
                <span className="pd-nav-icon">{item.icon}</span>{item.label}
              </button>
            ))}
          </nav>
          <div className="pd-sidebar-footer">
            <button className="pd-logout-btn" onClick={logout}>↩ Logout</button>
          </div>
        </aside>
      );
    }

    /* ==============================================================
       APP ROOT
       ============================================================== */
    function App() {
      const [tab, setTab] = useState('overview');

      /* Auth guard */
      if (!getToken()) { window.location.href = '/login.html'; return null; }
      const user = getUser();
      if (user && user.role !== 'photographer') { window.location.href = '/'; return null; }

      const TABS = {
        overview:     OverviewTab,
        profile:      ProfileTab,
        portfolio:    PortfolioTab,
        availability: AvailabilityTab,
        packages:     PackagesTab,
        reviews:      ReviewsTab,
        orders:       OrdersTab,
        earnings:     EarningsTab,
      };
      const TabContent = TABS[tab] || OverviewTab;

      return (
        <div className="pd-layout">
          <Sidebar tab={tab} setTab={setTab} user={user} />
          <main className="pd-main">
            <TabContent />
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  <script src="/chatbot.js"></script>
</body>
</html>
